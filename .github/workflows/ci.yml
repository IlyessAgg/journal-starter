name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: career_journal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_journal
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/career_journal
      # Required by api.config.Settings so the app boots. Tests never call a
      # real LLM — Task 4 uses an injected MockAsyncOpenAI client — so any
      # non-empty value works.
      OPENAI_API_KEY: ci-placeholder-not-used-by-mock

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Initialize database schema
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -U postgres -d career_journal \
            -f database_setup.sql

      - name: Run tests
        run: uv run pytest -v

  docker:
    name: Build & Push Docker Image
    needs:
      - lint
      - test
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id : auth
        name : Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
              -t us-central1-docker.pkg.dev/ilyag-devops-lab/journal-api/journal-api:${{ github.sha }} \
              -t us-central1-docker.pkg.dev/ilyag-devops-lab/journal-api/journal-api:latest \
              .
      
      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/ilyag-devops-lab/journal-api/journal-api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/ilyag-devops-lab/journal-api/journal-api:latest